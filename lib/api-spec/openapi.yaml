components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    Role:
      type: string
      enum: [client, freelancer, admin]

    UserStatus:
      type: string
      enum: [active, suspended, pending_email_verification, banned, deleted]

    VerificationStatus:
      type: string
      enum: [not_submitted, pending, verified, rejected, expired]

    ContractStatus:
      type: string
      enum:
        [
          draft,
          pending_client_payment,
          active,
          submitted_for_review,
          revision_requested,
          completed,
          cancelled,
          disputed,
        ]

    ContractType:
      type: string
      enum: [fixed_price, hourly]

    MilestoneStatus:
      type: string
      enum:
        [
          pending_funding,
          funded,
          in_progress,
          submitted,
          revision_requested,
          approved,
          released,
          cancelled,
          disputed,
        ]

    PaymentStatus:
      type: string
      enum: [pending, held, released, refunded, failed, succeeded]

    PayoutStatus:
      type: string
      enum: [requested, processing, paid, rejected, cancelled]

    RegisterBody:
      type: object
      required: [email, password, fullName, role]
      properties:
        email: { type: string }
        password: { type: string }
        fullName: { type: string }
        role:
          type: string
          enum: [client, freelancer]
        companyName: { type: ["string", "null"] }

    LoginBody:
      type: object
      required: [email, password]
      properties:
        email: { type: string }
        password: { type: string }

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token: { type: string }
        refreshToken: { type: ["string", "null"] }
        emailVerificationDevToken: { type: ["string", "null"] }
        user: { $ref: "#/components/schemas/Me" }

    Me:
      type: object
      required: [id, email, fullName, role, status, createdAt]
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        adminRole: { type: ["string", "null"] }
        status: { $ref: "#/components/schemas/UserStatus" }
        avatarUrl: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        emailVerifiedAt: { type: ["string", "null"], format: date-time }
        lastLoginAt: { type: ["string", "null"], format: date-time }
        phone: { type: ["string", "null"] }
        country: { type: ["string", "null"] }
        city: { type: ["string", "null"] }
        verificationStatus:
          $ref: "#/components/schemas/VerificationStatus"

    Category:
      type: object
      required: [id, slug, nameEn, nameAr]
      properties:
        id: { type: integer }
        slug: { type: string }
        nameEn: { type: string }
        nameAr: { type: string }

    Skill:
      type: object
      required: [id, name]
      properties:
        id: { type: integer }
        name: { type: string }

    MarketplaceStats:
      type: object
      required: [activeJobs, totalFreelancers, totalClients, totalProposals, completedJobs]
      properties:
        activeJobs: { type: integer }
        totalFreelancers: { type: integer }
        totalClients: { type: integer }
        totalProposals: { type: integer }
        completedJobs: { type: integer }
        totalPaidAed: { type: number }

    FreelancerCard:
      type: object
      required: [id, fullName, headline, skills, hourlyRate, currency, ratingAvg, ratingCount, location]
      properties:
        id: { type: integer }
        fullName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        headline: { type: string }
        skills:
          type: array
          items: { type: string }
        hourlyRate: { type: number }
        currency: { type: string }
        ratingAvg: { type: number }
        ratingCount: { type: integer }
        location: { type: string }

    FreelancerDetail:
      allOf:
        - $ref: "#/components/schemas/FreelancerCard"
        - type: object
          required: [bio, portfolio, completedJobs]
          properties:
            bio: { type: string }
            portfolio:
              type: array
              items:
                type: object
                required: [title, url]
                properties:
                  title: { type: string }
                  url: { type: string }
                  description: { type: ["string", "null"] }
            completedJobs: { type: integer }

    UpdateFreelancerProfileBody:
      type: object
      properties:
        fullName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        headline: { type: string }
        bio: { type: string }
        skills:
          type: array
          items: { type: string }
        hourlyRate: { type: number }
        location: { type: string }
        portfolio:
          type: array
          items:
            type: object
            required: [title, url]
            properties:
              title: { type: string }
              url: { type: string }
              description: { type: ["string", "null"] }

    ClientDetail:
      type: object
      required: [id, fullName, companyName, overview, activeJobs, completedJobs, ratingAvg, ratingCount]
      properties:
        id: { type: integer }
        fullName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        companyName: { type: string }
        logoUrl: { type: ["string", "null"] }
        overview: { type: string }
        location: { type: string }
        activeJobs: { type: integer }
        completedJobs: { type: integer }
        ratingAvg: { type: number }
        ratingCount: { type: integer }

    UpdateClientProfileBody:
      type: object
      properties:
        fullName: { type: string }
        avatarUrl: { type: ["string", "null"] }
        companyName: { type: string }
        logoUrl: { type: ["string", "null"] }
        overview: { type: string }
        location: { type: string }

    BudgetType:
      type: string
      enum: [fixed, hourly]

    JobStatus:
      type: string
      enum: [open, in_progress, completed, closed]

    JobCard:
      type: object
      required: [id, title, categorySlug, categoryNameEn, budgetType, budgetMin, budgetMax, currency, skills, status, createdAt, proposalCount, clientName]
      properties:
        id: { type: integer }
        title: { type: string }
        descriptionShort: { type: string }
        categorySlug: { type: string }
        categoryNameEn: { type: string }
        categoryNameAr: { type: string }
        budgetType: { $ref: "#/components/schemas/BudgetType" }
        budgetMin: { type: number }
        budgetMax: { type: number }
        currency: { type: string }
        skills:
          type: array
          items: { type: string }
        status: { $ref: "#/components/schemas/JobStatus" }
        deadline: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        proposalCount: { type: integer }
        clientId: { type: integer }
        clientName: { type: string }
        clientCompany: { type: ["string", "null"] }
        clientLogoUrl: { type: ["string", "null"] }

    JobDetail:
      allOf:
        - $ref: "#/components/schemas/JobCard"
        - type: object
          required: [description]
          properties:
            description: { type: string }
            saved: { type: boolean }

    Job:
      type: object
      required: [id, title, description, categorySlug, budgetType, budgetMin, budgetMax, currency, skills, status, createdAt, clientId]
      properties:
        id: { type: integer }
        title: { type: string }
        description: { type: string }
        categorySlug: { type: string }
        budgetType: { $ref: "#/components/schemas/BudgetType" }
        budgetMin: { type: number }
        budgetMax: { type: number }
        currency: { type: string }
        skills:
          type: array
          items: { type: string }
        status: { $ref: "#/components/schemas/JobStatus" }
        deadline: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }
        clientId: { type: integer }

    CreateJobBody:
      type: object
      required: [title, description, categorySlug, budgetType, budgetMin, budgetMax, skills]
      properties:
        title: { type: string }
        description: { type: string }
        categorySlug: { type: string }
        budgetType: { $ref: "#/components/schemas/BudgetType" }
        budgetMin: { type: number }
        budgetMax: { type: number }
        currency: { type: string }
        skills:
          type: array
          items: { type: string }
        deadline: { type: ["string", "null"], format: date-time }

    UpdateJobBody:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        categorySlug: { type: string }
        budgetType: { $ref: "#/components/schemas/BudgetType" }
        budgetMin: { type: number }
        budgetMax: { type: number }
        currency: { type: string }
        skills:
          type: array
          items: { type: string }
        deadline: { type: ["string", "null"], format: date-time }
        status: { $ref: "#/components/schemas/JobStatus" }

    ProposalStatus:
      type: string
      enum: [pending, shortlisted, accepted, rejected, withdrawn]

    Proposal:
      type: object
      required: [id, jobId, freelancerId, coverLetter, expectedRate, deliveryDays, status, createdAt]
      properties:
        id: { type: integer }
        jobId: { type: integer }
        freelancerId: { type: integer }
        coverLetter: { type: string }
        expectedRate: { type: number }
        deliveryDays: { type: integer }
        portfolioLinks:
          type: array
          items: { type: string }
        status: { $ref: "#/components/schemas/ProposalStatus" }
        createdAt: { type: string, format: date-time }

    ProposalDetail:
      allOf:
        - $ref: "#/components/schemas/Proposal"
        - type: object
          required: [freelancerName, jobTitle]
          properties:
            freelancerName: { type: string }
            freelancerAvatarUrl: { type: ["string", "null"] }
            freelancerHeadline: { type: ["string", "null"] }
            freelancerRatingAvg: { type: number }
            jobTitle: { type: string }
            jobBudgetMin: { type: number }
            jobBudgetMax: { type: number }
            jobCurrency: { type: string }

    CreateProposalBody:
      type: object
      required: [jobId, coverLetter, expectedRate, deliveryDays]
      properties:
        jobId: { type: integer }
        coverLetter: { type: string }
        expectedRate: { type: number }
        deliveryDays: { type: integer }
        portfolioLinks:
          type: array
          items: { type: string }

    UpdateProposalStatusBody:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/ProposalStatus" }

    ConversationSummary:
      type: object
      required: [id, otherUserId, otherUserName, jobId, jobTitle, lastMessage, lastMessageAt, unreadCount]
      properties:
        id: { type: integer }
        otherUserId: { type: integer }
        otherUserName: { type: string }
        otherUserAvatarUrl: { type: ["string", "null"] }
        jobId: { type: integer }
        jobTitle: { type: string }
        lastMessage: { type: string }
        lastMessageAt: { type: string, format: date-time }
        unreadCount: { type: integer }

    CreateConversationBody:
      type: object
      required: [jobId, otherUserId]
      properties:
        jobId: { type: integer }
        otherUserId: { type: integer }

    Message:
      type: object
      required: [id, conversationId, senderId, senderName, body, createdAt]
      properties:
        id: { type: integer }
        conversationId: { type: integer }
        senderId: { type: integer }
        senderName: { type: string }
        senderAvatarUrl: { type: ["string", "null"] }
        body: { type: string }
        createdAt: { type: string, format: date-time }

    SendMessageBody:
      type: object
      required: [body]
      properties:
        body: { type: string }

    Review:
      type: object
      required: [id, jobId, jobTitle, fromUserId, fromUserName, toUserId, rating, comment, createdAt]
      properties:
        id: { type: integer }
        jobId: { type: integer }
        jobTitle: { type: string }
        fromUserId: { type: integer }
        fromUserName: { type: string }
        fromUserAvatarUrl: { type: ["string", "null"] }
        toUserId: { type: integer }
        rating: { type: integer }
        comment: { type: string }
        createdAt: { type: string, format: date-time }

    CreateReviewBody:
      type: object
      required: [jobId, toUserId, rating, comment]
      properties:
        jobId: { type: integer }
        toUserId: { type: integer }
        rating: { type: integer }
        comment: { type: string }

    Notification:
      type: object
      required: [id, kind, title, body, read, createdAt]
      properties:
        id: { type: integer }
        kind: { type: string }
        title: { type: string }
        body: { type: string }
        link: { type: ["string", "null"] }
        read: { type: boolean }
        createdAt: { type: string, format: date-time }

    Payment:
      type: object
      required: [id, jobId, jobTitle, amount, currency, status, payerName, payeeName, createdAt]
      properties:
        id: { type: integer }
        jobId: { type: integer }
        jobTitle: { type: string }
        amount: { type: number }
        currency: { type: string }
        status: { type: string }
        payerName: { type: string }
        payeeName: { type: string }
        invoiceNumber: { type: string }
        contractId: { type: ["integer", "null"] }
        milestoneId: { type: ["integer", "null"] }
        platformFeeAmount: { type: number }
        freelancerNetAmount: { type: number }
        heldAt: { type: ["string", "null"], format: date-time }
        releasedAt: { type: ["string", "null"], format: date-time }
        createdAt: { type: string, format: date-time }

    CreatePaymentIntentBody:
      type: object
      required: [jobId, proposalId, amount]
      properties:
        jobId: { type: integer }
        proposalId: { type: integer }
        amount: { type: number }
        currency: { type: string }

    PaymentIntent:
      type: object
      required: [paymentId, clientSecret, amount, currency, status]
      properties:
        paymentId: { type: integer }
        clientSecret: { type: string }
        amount: { type: number }
        currency: { type: string }
        status: { type: string }

    AdminUser:
      type: object
      required: [id, email, fullName, role, status, createdAt, jobsCount, proposalsCount]
      properties:
        id: { type: integer }
        email: { type: string }
        fullName: { type: string }
        role: { $ref: "#/components/schemas/Role" }
        status: { $ref: "#/components/schemas/UserStatus" }
        createdAt: { type: string, format: date-time }
        jobsCount: { type: integer }
        proposalsCount: { type: integer }

    UpdateUserStatusBody:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/UserStatus" }

    AdminAnalytics:
      type: object
      required: [users, jobs, proposals, payments, revenueAed, recentSignups, jobsByCategory, paymentsByMonth]
      properties:
        users: { type: integer }
        clients: { type: integer }
        freelancers: { type: integer }
        jobs: { type: integer }
        activeJobs: { type: integer }
        proposals: { type: integer }
        payments: { type: integer }
        revenueAed: { type: number }
        recentSignups:
          type: array
          items:
            type: object
            required: [date, count]
            properties:
              date: { type: string }
              count: { type: integer }
        jobsByCategory:
          type: array
