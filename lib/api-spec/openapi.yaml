openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: UAE Freelance Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: users
  - name: jobs
  - name: proposals
  - name: conversations
  - name: messages
  - name: reviews
  - name: notifications
  - name: payments
  - name: admin
  - name: meta
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterBody"
      responses:
        "200":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"

  /meta/stats:
    get:
      operationId: getMarketplaceStats
      tags: [meta]
      responses:
        "200":
          description: Marketplace stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"
  /meta/categories:
    get:
      operationId: listCategories
      tags: [meta]
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
  /meta/skills:
    get:
      operationId: listSkills
      tags: [meta]
      responses:
        "200":
          description: Skills
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Skill"

  /freelancers:
    get:
      operationId: listFreelancers
      tags: [users]
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: skill
          schema: { type: string }
        - in: query
          name: minRate
          schema: { type: number }
        - in: query
          name: maxRate
          schema: { type: number }
      responses:
        "200":
          description: Freelancers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FreelancerCard"
  /freelancers/{id}:
    get:
      operationId: getFreelancer
      tags: [users]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Freelancer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerDetail"
  /profiles/freelancer:
    put:
      operationId: updateFreelancerProfile
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFreelancerProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FreelancerDetail"
  /profiles/client:
    put:
      operationId: updateClientProfile
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClientProfileBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"
  /clients/{id}:
    get:
      operationId: getClient
      tags: [users]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Client profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientDetail"

  /jobs:
    get:
      operationId: listJobs
      tags: [jobs]
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: skill
          schema: { type: string }
        - in: query
          name: budgetType
          schema: { type: string }
        - in: query
          name: minBudget
          schema: { type: number }
        - in: query
          name: maxBudget
          schema: { type: number }
        - in: query
          name: mine
          schema: { type: boolean }
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobCard"
    post:
      operationId: createJob
      tags: [jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateJobBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /jobs/{id}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobDetail"
    patch:
      operationId: updateJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateJobBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
    delete:
      operationId: deleteJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
  /jobs/{id}/complete:
    post:
      operationId: completeJob
      tags: [jobs]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"

  /saved-jobs:
    get:
      operationId: listSavedJobs
      tags: [jobs]
      responses:
        "200":
          description: Saved jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobCard"
  /saved-jobs/{jobId}:
    post:
      operationId: saveJob
      tags: [jobs]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Saved
    delete:
      operationId: unsaveJob
      tags: [jobs]
      parameters:
        - in: path
          name: jobId
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Removed

  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      parameters:
        - in: query
          name: jobId
          schema: { type: integer }
        - in: query
          name: mine
          schema: { type: boolean }
      responses:
        "200":
          description: Proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProposalDetail"
    post:
      operationId: createProposal
      tags: [proposals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProposalBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"
  /proposals/{id}/status:
    patch:
      operationId: updateProposalStatus
      tags: [proposals]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposalStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Proposal"

  /conversations:
    get:
      operationId: listConversations
      tags: [conversations]
      responses:
        "200":
          description: Conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConversationSummary"
    post:
      operationId: createConversation
      tags: [conversations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationSummary"
  /conversations/{id}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"
    post:
      operationId: sendMessage
      tags: [messages]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageBody"
      responses:
        "200":
          description: Sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      parameters:
        - in: query
          name: userId
          schema: { type: integer }
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReviewBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Notification"
  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      responses:
        "204":
          description: Read

  /payments:
    get:
      operationId: listPayments
      tags: [payments]
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
  /payments/create-intent:
    post:
      operationId: createPaymentIntent
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentIntentBody"
      responses:
        "200":
          description: Intent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentIntent"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
  /admin/users.csv:
    get:
      operationId: adminExportUsersCsv
      tags: [admin]
      summary: Stream the full filtered users list as CSV.
      description: |
        Server-side CSV export. Honors the same filters as the admin UI
        (`q`, `role`, `status`, `dateFrom`, `dateTo`) and streams the rows
        directly from Postgres so big tenants can export thousands of users
        without freezing the browser or the API process.
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: role
          schema: { type: string, enum: [client, freelancer, admin] }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: dateFrom
          schema: { type: string, format: date-time }
        - in: query
          name: dateTo
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: CSV stream of users.
          content:
            text/csv:
              schema:
                type: string
                format: binary
  /admin/payments.csv:
    get:
      operationId: adminExportPaymentsCsv
      tags: [admin]
      summary: Stream the full filtered payments list as CSV.
      description: |
        Server-side CSV export. Honors the same filters as the admin UI
        (`q`, `status`, `currency`, `dateFrom`, `dateTo`) and streams rows
        directly from Postgres so exports of large payment histories don't
        time out or exhaust memory.
      parameters:
        - in: query
          name: q
          schema: { type: string }
        - in: query
          name: status
          schema: { type: string }
        - in: query
          name: currency
          schema: { type: string }
        - in: query
          name: dateFrom
          schema: { type: string, format: date-time }
        - in: query
          name: dateTo
          schema: { type: string, format: date-time }
      responses:
        "200":
          description: CSV stream of payments.
          content:
            text/csv:
              schema:
                type: string
                format: binary
  /admin/users/{id}/status:
    patch:
      operationId: adminUpdateUserStatus
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
  /admin/jobs:
    get:
      operationId: adminListJobs
      tags: [admin]
      responses:
        "200":
          description: Jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/JobCard"
  /admin/payments:
    get:
      operationId: adminListPayments
      tags: [admin]
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
  /admin/analytics:
    get:
      operationId: adminAnalytics
      tags: [admin]
      responses:
        "200":
          description: Analytics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAnalytics"
  /admin/complaints:
    get:
      operationId: adminListComplaints
      tags: [admin]
      responses:
        "200":
          description: Complaints
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Complaint"

  /complaints:
    post:
      operationId: createComplaint
      tags: [admin]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateComplaintBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Complaint"

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenBody"
      responses:
        "200":
          description: Refreshed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutBody"
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"
  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordBody"
      responses:
        "200":
          description: Reset email queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordBody"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"
  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailBody"
      responses:
        "200":
          description: Email verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"
  /auth/resend-verification:
    post:
      operationId: resendVerification
      tags: [auth]
      responses:
        "200":
          description: Verification email queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgotPasswordResponse"
  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SimpleOk"

  /verifications:
    get:
      operationId: getMyVerification
      tags: [verifications]
      responses:
        "200":
          description: Latest verification submission for the current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationDetail"
    post:
      operationId: submitVerification
      tags: [verifications]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitVerificationBody"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationDetail"
  /admin/verifications:
    get:
      operationId: adminListVerifications
      tags: [admin]
      parameters:
        - in: query
          name: status
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Verifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VerificationDetail"
  /admin/verifications/{id}:
    patch:
      operationId: adminReviewVerification
      tags: [admin]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminReviewVerificationBody"
      responses:
        "200":
          description: Reviewed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerificationDetail"

  /contracts:
    get:
      operationId: listMyContracts
      tags: [contracts]
      responses:
        "200":
          description: Contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ContractSummary"
  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Contract detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractDetail"
    patch:
      operationId: updateContract
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContractDetail"

  /contracts/{id}/milestones:
    get:
      operationId: listMilestones
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Milestones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MilestoneDetail"
    post:
      operationId: createMilestone
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMilestoneBody"
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestoneDetail"
  /milestones/{id}/fund:
    post:
      operationId: fundMilestone
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Funded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestoneDetail"
  /milestones/{id}/submit:
    post:
      operationId: submitMilestoneDeliverable
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitDeliverableBody"
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestoneDetail"
  /milestones/{id}/approve:
    post:
      operationId: approveMilestone
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestoneDetail"
  /milestones/{id}/request-revision:
    post:
      operationId: requestMilestoneRevision
      tags: [contracts]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RequestRevisionBody"
      responses:
        "200":
          description: Revision requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MilestoneDetail"

  /wallet/me:
    get:
      operationId: getMyWallet
      tags: [wallet]
      responses:
        "200":
          description: Wallet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletDetail"
