    SsoProviderAdmin:
      type: object
      required: [id, slug, type, displayName, enabled, isDefault, scopes, autoProvision, defaultRole, allowedDomains, secretConfigured, createdAt]
      properties:
        id: { type: integer }
        slug: { type: string }
        type: { type: string }
        displayName: { type: string }
        displayNameAr: { type: ["string", "null"] }
        enabled: { type: boolean }
        isDefault: { type: boolean }
        issuerUrl: { type: ["string", "null"] }
        clientId: { type: ["string", "null"] }
        # clientSecretRef and clientSecretValue are write-only on upsert; never returned in admin reads.
        secretConfigured: { type: boolean }
        # Where the resolved secret currently lives: "env" (env-var ref),
        # "db" (encrypted in identity_providers.client_secret_enc), or null
        # when no secret is set.
        secretSource:
          type: ["string", "null"]
          enum: [env, db, null]
        scopes: { type: string }
        autoProvision: { type: boolean }
        defaultRole: { type: string }
        allowedDomains:
          type: array
          items: { type: string }
        roleMappingJson:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    SsoProviderUpsertBody:
      type: object
      required: [slug, type, displayName]
      properties:
        slug: { type: string }
        type:
          type: string
          enum: [google, linkedin, microsoft, keycloak, oidc]
        displayName: { type: string }
        displayNameAr: { type: ["string", "null"] }
        enabled: { type: boolean }
        isDefault: { type: boolean }
        issuerUrl: { type: ["string", "null"] }
        clientId: { type: ["string", "null"] }
        # Env-var pointer (e.g. "env:GOOGLE_CLIENT_SECRET"). Use this OR
        # clientSecretValue. Supplying clientSecretValue takes precedence
        # and clears any prior env ref. Both fields are write-only.
        clientSecretRef: { type: ["string", "null"] }
        # Raw secret pasted by an admin. Server-side it is encrypted with
        # AES-256-GCM and stored in identity_providers.client_secret_enc.
        # Never returned in API responses. Omitting this field on update
        # leaves any existing stored secret untouched.
        clientSecretValue: { type: ["string", "null"] }
        scopes: { type: ["string", "null"] }
        autoProvision: { type: boolean }
        defaultRole: { type: ["string", "null"] }
        allowedDomains:
          type: array
          items: { type: string }
        roleMappingJson:
          type: object
          additionalProperties: true
        metadata:
          type: object
          additionalProperties: true

