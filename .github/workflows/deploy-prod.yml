name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      seed:
        description: "Run pnpm seed after deploy (DESTRUCTIVE — wipes data)"
        type: boolean
        default: false

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy via SSM Run Command
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
      DEPLOY_ROLE_ARN: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
      EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
      DEPLOY_SCRIPT: /opt/atmemly/app/infra/aws/scripts/deploy.sh
      SEED: ${{ github.event_name == 'workflow_dispatch' && inputs.seed && '1' || '0' }}

    steps:
      - name: Validate required configuration
        run: |
          set -euo pipefail
          missing=0
          for v in DEPLOY_ROLE_ARN EC2_INSTANCE_ID; do
            if [[ -z "${!v:-}" ]]; then
              echo "::error::Missing required GitHub Actions variable: ${v}"
              missing=1
            fi
          done
          [[ "${missing}" == "0" ]]

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          role-session-name: github-actions-deploy-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Send deploy command to EC2 via SSM
        id: send
        run: |
          set -euo pipefail
          COMMENT="GH Actions deploy ${GITHUB_SHA::7} (run ${GITHUB_RUN_ID})"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${EC2_INSTANCE_ID}" \
            --document-name "AWS-RunShellScript" \
            --comment "${COMMENT}" \
            --cloud-watch-output-config "CloudWatchOutputEnabled=true" \
            --parameters "commands=[\"sudo -E SEED=${SEED} ${DEPLOY_SCRIPT}\"]" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${CMD_ID}" >> "${GITHUB_OUTPUT}"
          echo "Dispatched SSM CommandId=${CMD_ID} to ${EC2_INSTANCE_ID}"

      - name: Wait for SSM command to finish
        env:
          CMD_ID: ${{ steps.send.outputs.command_id }}
        run: |
          set -euo pipefail
          # `aws ssm wait command-executed` only polls ~20 attempts × 5s
          # (~100s) with no override knob, so on a t3.small a normal
          # deploy.sh run (docker build + drizzle push + healthz wait)
          # always exceeds it and the step false-fails with status
          # "InProgress". Roll our own bounded poller instead.
          DEADLINE=$((SECONDS + 1800))   # 30 min hard cap
          STATUS="Pending"
          while (( SECONDS < DEADLINE )); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${CMD_ID}" \
              --instance-id "${EC2_INSTANCE_ID}" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "${STATUS}" in
              Success|Failed|Cancelled|TimedOut) break ;;
            esac
            sleep 15
          done

          echo "::group::SSM stdout"
          aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardOutputContent" --output text || true
          echo "::endgroup::"

          echo "::group::SSM stderr"
          aws ssm get-command-invocation \
            --command-id "${CMD_ID}" \
            --instance-id "${EC2_INSTANCE_ID}" \
            --query "StandardErrorContent" --output text || true
          echo "::endgroup::"

          echo "Final SSM status: ${STATUS}"
          if [[ "${STATUS}" != "Success" ]]; then
            echo "::error::Deploy failed with status ${STATUS}"
            exit 1
          fi
