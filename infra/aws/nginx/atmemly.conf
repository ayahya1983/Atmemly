server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    # Use Docker's embedded DNS so api-server resolution happens at
    # request time (not nginx start-up). Avoids the chicken-and-egg
    # case where nginx boots before docker's DNS has the upstream.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $atmemly_api "http://api-server:8080";

    # gzip text assets
    gzip on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript text/xml
        application/javascript application/json application/xml
        application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    # ---- API ----
    location /api/ {
        proxy_pass         $atmemly_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 75s;
    }

    # ---- Admin SPA ----
    location /admin/ {
        alias /srv/admin/;
        try_files $uri $uri/ /admin/index.html;

        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico|map)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }
    }

    # ---- Marketplace SPA (root) ----
    location / {
        root /srv/marketplace;
        try_files $uri $uri/ /index.html;

        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpe?g|gif|webp|ico|map)$ {
            expires 30d;
            add_header Cache-Control "public, max-age=2592000, immutable";
            try_files $uri =404;
        }
    }
}
