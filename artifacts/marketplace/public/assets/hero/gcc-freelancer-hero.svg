<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" role="img" aria-label="ATMEMLY GCC freelancer marketplace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f3a5f"/>
      <stop offset="55%" stop-color="#458cca"/>
      <stop offset="100%" stop-color="#7dc4d6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5d58a"/>
      <stop offset="100%" stop-color="#c89b3c"/>
    </linearGradient>
    <pattern id="geo" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M24 0 L48 24 L24 48 L0 24 Z" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
      <circle cx="24" cy="24" r="3" fill="#ffffff" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="600" height="600" rx="48" fill="url(#bg)"/>
  <rect width="600" height="600" rx="48" fill="url(#geo)"/>
  <!-- Abstract Dubai skyline silhouette -->
  <g opacity="0.55" fill="#0a2238">
    <rect x="60" y="380" width="36" height="160"/>
    <rect x="100" y="320" width="48" height="220"/>
    <polygon points="155,540 175,260 195,540"/>
    <rect x="200" y="350" width="40" height="190"/>
    <rect x="245" y="290" width="32" height="250"/>
    <polygon points="280,540 305,200 330,540"/>
    <rect x="338" y="360" width="44" height="180"/>
    <rect x="386" y="310" width="36" height="230"/>
    <rect x="425" y="380" width="50" height="160"/>
    <rect x="478" y="340" width="34" height="200"/>
    <rect x="514" y="395" width="40" height="145"/>
  </g>
  <!-- Sun / hub circle -->
  <circle cx="430" cy="180" r="80" fill="url(#gold)" opacity="0.85"/>
  <circle cx="430" cy="180" r="80" fill="none" stroke="#ffffff" stroke-opacity="0.4" stroke-width="2"/>
  <!-- Eight-point star (GCC pattern hint) -->
  <g transform="translate(170 170)" fill="#ffffff" fill-opacity="0.9">
    <polygon points="0,-70 20,-20 70,0 20,20 0,70 -20,20 -70,0 -20,-20"/>
    <polygon points="0,-70 20,-20 70,0 20,20 0,70 -20,20 -70,0 -20,-20" transform="rotate(22.5)" fill-opacity="0.5"/>
  </g>
  <!-- Laptop/dashboard mock -->
  <g transform="translate(180 320)">
    <rect x="0" y="0" width="240" height="150" rx="10" fill="#ffffff" opacity="0.95"/>
    <rect x="0" y="140" width="240" height="14" rx="3" fill="#cbd5e1"/>
    <rect x="14" y="14" width="84" height="10" rx="3" fill="#458cca"/>
    <rect x="14" y="32" width="56" height="6" rx="2" fill="#94a3b8"/>
    <rect x="14" y="48" width="210" height="40" rx="6" fill="#e6f1f9"/>
    <rect x="22" y="58" width="60" height="8" rx="2" fill="#458cca"/>
    <rect x="22" y="72" width="120" height="6" rx="2" fill="#94a3b8"/>
    <rect x="14" y="98" width="100" height="34" rx="6" fill="#fef3c7"/>
    <rect x="124" y="98" width="100" height="34" rx="6" fill="#dcfce7"/>
    <circle cx="200" cy="22" r="6" fill="#22c55e"/>
  </g>
  <!-- Brand mark -->
  <g transform="translate(60 60)" fill="#ffffff">
    <rect x="0" y="0" width="36" height="36" rx="10" fill="url(#gold)"/>
    <text x="48" y="26" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="800" letter-spacing="2">ATMEMLY</text>
  </g>
</svg>
